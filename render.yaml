services:
  - type: web
    name: stop-de-goteras
    runtime: static
    buildCommand: ""
    staticPublishPath: .
    pullRequestPreviewsEnabled: false
    headers:
      - path: /*
        name: X-Frame-Options
        value: SAMEORIGIN
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
      - path: /*
        name: Permissions-Policy
        value: geolocation=(), microphone=(), camera=()
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=604800
    routes:
      - type: redirect
        source: /index.html
        destination: /
      - type: redirect
        source: /servicios.html
        destination: /servicios
      - type: redirect
        source: /nosotros.html
        destination: /nosotros
      - type: redirect
        source: /trabajos.html
        destination: /trabajos
      - type: redirect
        source: /opiniones.html
        destination: /opiniones
      - type: redirect
        source: /contacto.html
        destination: /contacto
      - type: redirect
        source: /aviso-legal.html
        destination: /aviso-legal
      - type: redirect
        source: /privacidad.html
        destination: /privacidad
      - type: redirect
        source: /cookies.html
        destination: /cookies
      - type: rewrite
        source: /servicios
        destination: /servicios.html
      - type: rewrite
        source: /nosotros
        destination: /nosotros.html
      - type: rewrite
        source: /trabajos
        destination: /trabajos.html
      - type: rewrite
        source: /opiniones
        destination: /opiniones.html
      - type: rewrite
        source: /contacto
        destination: /contacto.html
      - type: rewrite
        source: /aviso-legal
        destination: /aviso-legal.html
      - type: rewrite
        source: /privacidad
        destination: /privacidad.html
      - type: rewrite
        source: /cookies
        destination: /cookies.html
